name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  package-windows:
    name: Package Windows VST3
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (VS 2022, static CRT)
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DFAMALAMAJAM_ENABLE_TESTS=OFF

      - name: Build Release
        run: cmake --build build --config Release --target famalamajam_plugin_VST3

      - name: Package Windows VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $assetName = "FamaLamaJam-$env:RELEASE_TAG-windows-vst3.zip"
          $sourcePath = "build/famalamajam_plugin_artefacts/Release/VST3/FamaLamaJam.vst3"
          Compress-Archive -Path $sourcePath -DestinationPath "dist/$assetName" -Force

      - name: Upload packaged Windows assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: dist/*.zip

  package-macos:
    name: Package macOS VST3 + AU
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Xcode, universal binary)
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DFAMALAMAJAM_ENABLE_TESTS=OFF

      - name: Build Release
        run: cmake --build build --config Release --target famalamajam_plugin_VST3 famalamajam_plugin_AU

      - name: Package macOS plugin bundles
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            build/famalamajam_plugin_artefacts/Release/VST3/FamaLamaJam.vst3 \
            dist/FamaLamaJam-${RELEASE_TAG}-macos-vst3.zip
          ditto -c -k --sequesterRsrc --keepParent \
            build/famalamajam_plugin_artefacts/Release/AU/FamaLamaJam.component \
            dist/FamaLamaJam-${RELEASE_TAG}-macos-au.zip

      - name: Upload packaged macOS assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: dist/*.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package-windows
      - package-macos

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-assets-*
          merge-multiple: true

      - name: Create release metadata
        run: |
          cd dist
          sha256sum *.zip > SHA256SUMS.txt
          cat <<EOF > README-install.txt
          FamaLamaJam ${RELEASE_TAG}

          Included assets:
          - Windows VST3 zip
          - macOS VST3 zip
          - macOS AU zip

          Checksums for the packaged downloads are listed in SHA256SUMS.txt.
          EOF

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
            dist/README-install.txt
