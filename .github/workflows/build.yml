name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Windows — VST3 (self-contained, no MSVC runtime DLLs required)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows VST3
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (VS 2022, static CRT)
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DFAMALAMAJAM_ENABLE_TESTS=OFF

      - name: Build Release
        run: cmake --build build --config Release --target famalamajam_plugin_VST3

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: FamaLamaJam-VST3-Windows
          path: build/famalamajam_plugin_artefacts/Release/VST3/

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS — VST3 + AU (universal binary: arm64 + x86_64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS VST3 + AU
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure (Xcode, universal binary)
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DFAMALAMAJAM_ENABLE_TESTS=OFF

      - name: Build Release
        run: cmake --build build --config Release --target famalamajam_plugin_VST3 famalamajam_plugin_AU

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: FamaLamaJam-VST3-macOS
          path: build/famalamajam_plugin_artefacts/Release/VST3/

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: FamaLamaJam-AU-macOS
          path: build/famalamajam_plugin_artefacts/Release/AU/
